<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Tugas Praktikum - Pastel Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            /* Kombinasi gradien pastel lilac lembut ke pink-peach susu */
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-700">

    <div class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-xl w-full max-w-md border border-purple-100 transform transition duration-300 hover:scale-[1.01]">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 tracking-tight">
                Kirim Tugasmu ✨
            </h1>
            <p class="text-xs text-slate-400 mt-1.5 font-medium tracking-wide uppercase">Cloud Computing Azure</p>
        </div>

        <form action="/submit-task" method="POST" enctype="multipart/form-data" class="space-y-4">
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1" for="nim">NIM</label>
                <input type="text" id="nim" name="nim" required placeholder="Masukkan NIM"
                    class="w-full px-4 py-2 rounded-xl border border-purple-50 bg-purple-50/30 focus:outline-none focus:ring-2 focus:ring-purple-200 focus:bg-white focus:border-purple-300 transition placeholder:text-slate-300 text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1" for="name">Nama Lengkap</label>
                <input type="text" id="name" name="name" required placeholder="Masukkan nama lengkap"
                    class="w-full px-4 py-2 rounded-xl border border-purple-50 bg-purple-50/30 focus:outline-none focus:ring-2 focus:ring-purple-200 focus:bg-white focus:border-purple-300 transition placeholder:text-slate-300 text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1" for="class">Kelas</label>
                <input type="text" id="class" name="class" required placeholder="Contoh: TI-2A"
                    class="w-full px-4 py-2 rounded-xl border border-purple-50 bg-purple-50/30 focus:outline-none focus:ring-2 focus:ring-purple-200 focus:bg-white focus:border-purple-300 transition placeholder:text-slate-300 text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1" for="course">Mata Kuliah</label>
                <input type="text" id="course" name="course" required placeholder="Contoh: Cloud Computing"
                    class="w-full px-4 py-2 rounded-xl border border-purple-50 bg-purple-50/30 focus:outline-none focus:ring-2 focus:ring-purple-200 focus:bg-white focus:border-purple-300 transition placeholder:text-slate-300 text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1" for="file_tugas">File Tugas</label>
                <div class="relative flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-purple-100 rounded-xl cursor-pointer bg-purple-50/10 hover:bg-purple-50/40 hover:border-purple-200 transition">
                        <div class="flex flex-col items-center justify-center text-center px-4">
                            <svg class="w-7 h-7 mb-1.5 text-pink-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                            </svg>
                            <p class="text-xs font-medium text-slate-500">Cari file tugasmu di sini</p>
                            <p class="text-[10px] text-slate-400 mt-0.5">Format PDF / ZIP (Maks 10MB)</p>
                        </div>
                        <input type="file" id="file_tugas" name="file_tugas" required class="hidden" />
                    </label>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-purple-300 to-pink-300 hover:from-purple-400 hover:to-pink-400 text-white font-bold py-2.5 rounded-xl shadow-md hover:shadow-lg transition-all transform active:scale-[0.99] mt-3 text-sm tracking-wide">
                Kirim Sekarang 🚀
            </button>
        </form>
    </div>

</body>
</html>
