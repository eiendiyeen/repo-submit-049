<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Tugas Praktikum | Cloud Computing</title>
    <style>
        :root {
            /* Warna diubah menjadi kombinasi pastel lucu & lembut */
            --primary-pastel: #c0b3f2;       /* Ungu lilac pastel untuk tombol utama */
            --soft-bg: #f0f3ff;              /* Background luar kombinasi biru-putih susu */
            --text-dark: #675993;            /* Warna teks ungu pastel gelap agar tetap terbaca rapi */
            --border-pastel: #e2d9ff;        /* Batasan border input warna lavender muda */
            --white: #ffffff;
            --pink-accent: #ffccd5;          /* Aksen pink pastel untuk hover */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Efek gradien pastel permen kapas super gemas */
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 20px;
            /* Bayangan halus tipis khas desain modern pastel */
            box-shadow: 0 10px 25px rgba(147, 130, 216, 0.12); 
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        h2 {
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-dark);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], select, input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-pastel);
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            background-color: #faf9ff;
            color: #554a7d;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary-pastel);
            box-shadow: 0 0 10px rgba(192, 179, 242, 0.4);
            background-color: var(--white);
        }

        /* Styling tombol upload bawaan biar senada bertema pastel */
        input[type="file"]::-webkit-file-upload-button {
            background-color: #f1edff;
            color: var(--text-dark);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.2s;
        }

        input[type="file"]::-webkit-file-upload-button:hover {
            background-color: var(--primary-pastel);
            color: var(--white);
        }

        button {
            width: 100%;
            /* Tombol menggunakan gradien ungu-pink macaron pastel */
            background: linear-gradient(135deg, #c0b3f2 0%, #f1b3d1 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(192, 179, 242, 0.3);
        }

        button:hover {
            /* Efek hover melembut dan sedikit membesar */
            background: linear-gradient(135deg, #b0a1ea 0%, #e69fc1 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(192, 179, 242, 0.45);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: var(--text-dark);
            opacity: 0.6;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Praktikum Submit</h2>
        <form action="/submit-task" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>NIM Mahasiswa</label>
                <input type="text" name="nim" placeholder="Contoh: 0920240049" required>
            </div>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" name="name" placeholder="Nama Anda" required>
            </div>

            <div class="form-group">
                <label>Kelas</label>
                <input type="text" name="class" placeholder="Contoh: TRPL 2A" required>
            </div>

            <div class="form-group">
                <label>Mata Kuliah</label>
                <select name="course">
                    <option value="Cloud Computing">Cloud Computing</option>
                    <option value="Mobile Programming">Mobile Programming</option>
                    <option value="Machine Learning">Machine Learning</option>
                </select>
            </div>

            <div class="form-group">
                <label>Upload File Tugas</label>
                <input type="file" name="file_tugas" required>
            </div>

            <button type="submit">Kirim Tugas</button>
        </form>

        <div class="footer">
            Layanan Azure Cloud Submit
        </div>
    </div>

</body>
</html>
